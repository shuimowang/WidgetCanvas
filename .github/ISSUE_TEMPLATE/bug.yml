name: Bug report
description: Report reproducible WidgetCanvas behavior.
title: "[Bug] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest widget HTML that reproduces the issue when possible. Remove private paths, tokens, and data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Screenshots and logs from LocalAppData\浮岛\Logs are useful.
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
    validations:
      required: true
