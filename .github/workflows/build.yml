name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore WidgetCanvas.slnx
      - name: Test
        run: dotnet test tests/WidgetCanvas.Tests/WidgetCanvas.Tests.csproj -c Release --no-restore
      - name: Publish
        run: dotnet publish src/WidgetCanvas/WidgetCanvas.csproj -c Release -r win-x64 --self-contained true --no-restore -o artifacts/WidgetCanvas
      - uses: actions/upload-artifact@v4
        with:
          name: WidgetCanvas-win-x64
          path: artifacts/WidgetCanvas
